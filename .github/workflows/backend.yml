name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
    - "apps/backend/**"
    - "infra/docker/Dockerfile.backend"
    - ".github/workflows/backend.yml"
  pull_request:
    paths:
    - "apps/backend/**"
    - "infra/docker/Dockerfile.backend"
    - ".github/workflows/backend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  ECR_REPO: link-vault/backend

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Ruff — lint
      run: |
        pip install ruff
        ruff check apps/backend
    - name: SAST deep scan (placeholder)
      run: echo "TODO:/ configure SonarQube / Semgrep / CodeClimate"

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
        cache-dependency-path: |
          apps/backend/requirements.txt
          apps/backend/requirements-dev.txt
    - name: Install dependencies
      run: pip install -r requirements.txt -r requirements-dev.txt
    - name: Run tests with coverage
      run: |
        pytest \
          --cov=. \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml \
          --cov-fail-under=20
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-coverage
        path: apps/backend/coverage.xml

  container:
    name: Container Build & Scan
    needs: [ static-analysis, test ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC → AWS role assumption
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials (OIDC)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Log in to ECR
      id: ecr-login
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: aws-actions/amazon-ecr-login@v2

    # Resolve the full image name here so every subsequent step gets a valid reference.
    # On main:  <account>.dkr.ecr.<region>.amazonaws.com/link-vault/backend
    # On PRs:   link-vault/backend  (local, never pushed)
    - name: Set image name
      id: image
      run: |
        if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "name=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}" >> $GITHUB_OUTPUT
        else
          echo "name=${{ env.ECR_REPO }}" >> $GITHUB_OUTPUT
        fi

    - uses: docker/metadata-action@v5
      id: meta
      with:
        images: ${{ steps.image.outputs.name }}
        tags: |
          type=sha,format=long
          type=ref,event=branch
          type=semver,pattern={{version}}

    - name: Build & push image
      uses: docker/build-push-action@v6
      with:
        context: apps/backend
        file: infra/docker/Dockerfile.backend
        load: true
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ${{ steps.meta.outputs.tags }}
          ${{ steps.image.outputs.name }}:scan-target
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Trivy — vulnerability scan
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ steps.image.outputs.name }}:scan-target
        format: sarif
        output: trivy.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        exit-code: 0

    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy.sarif
        category: trivy-backend

  update-image:
    name: Update Image Tag in GitOps values
    needs: container
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install yq
      env:
        YQ_VERSION: v4.44.3
      run: |
        wget -qO /usr/local/bin/yq \
          https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64
        chmod +x /usr/local/bin/yq

    - name: Update image tag
      run: |
        yq -i '.image.tag = "sha-${{ github.sha }}"' \
          gitops/environments/dev/backend.yaml

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add gitops/environments/dev/backend.yaml
        git diff --staged --quiet || \
        git commit -m "chore(gitops): bump backend image tag to sha-${{ github.sha }}"
        git push
