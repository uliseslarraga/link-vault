name: Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
    - "apps/frontend/**"
    - "infra/docker/Dockerfile.frontend"
    - ".github/workflows/frontend.yml"
  pull_request:
    paths:
    - "apps/frontend/**"
    - "infra/docker/Dockerfile.frontend"
    - ".github/workflows/frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/frontend
  NODE_VERSION: "20"

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: apps/frontend/package-lock.json
    - run: npm ci

    # ── Placeholder: ESLint ────────────────────────────────────────────────
    # TODO: add eslint + @eslint/js config and replace this step with:
    #   npm run lint
    #- name: ESLint (placeholder)
    #  run: echo "TODO: configure ESLint and run npm run lint"

    # ── Placeholder: SAST ─────────────────────────────────────────────────
    # TODO: configure SonarQube / Semgrep / CodeClimate
    - name: SAST deep scan (placeholder)
      run: echo "TODO:\ configure SonarQube / Semgrep / CodeClimate"

  test:
    name: Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: apps/frontend/package-lock.json
    - run: npm ci
    - name: Build
      run: npm run build
    - name: Test with coverage
      run: echo "npm run test:coverage"
      # Coverage gate: set thresholds.lines/branches in vite.config.js
      # once meaningful tests exist
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-coverage
        path: apps/frontend/coverage/

  container:
    name: Container Build & Scan
    needs: [ static-analysis, test ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/metadata-action@v5
      id: meta
      with:
        images: ${{ env.IMAGE }}
        tags: |
          type=sha,format=long
          type=ref,event=branch
          type=semver,pattern={{version}}
    - name: Build image
      uses: docker/build-push-action@v6
      with:
        context: apps/frontend
        file: infra/docker/Dockerfile.frontend
        load: true
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ${{ steps.meta.outputs.tags }}
          ${{ env.IMAGE }}:scan-target
        labels: ${{ steps.meta.outputs.labels }}
        build-args: VITE_API_URL=/api/v1
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Trivy — vulnerability scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: ${{ env.IMAGE }}:scan-target
        format: sarif
        output: trivy.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        exit-code: 1
    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy.sarif
        category: trivy-frontend

  update-image:
    name: Update Image in helm values file
    needs: container
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Update Helm values (placeholder)
      run: |
        echo "Image: ${{ env.IMAGE }}:sha-${{ github.sha }}"
        echo "TODO: push updated Helm values and trigger ArgoCD sync"
