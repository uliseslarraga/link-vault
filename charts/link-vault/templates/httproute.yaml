{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "link-vault.fullname" . }}
  labels:
    {{- include "link-vault.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ required "httpRoute.gatewayName is required when httpRoute.enabled is true" .Values.httpRoute.gatewayName }}
      namespace: {{ .Values.httpRoute.gatewayNamespace | default .Release.Namespace }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.httpRoute.rules }}
    {{- range .Values.httpRoute.rules }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      backendRefs:
        {{- if .backendRefs }}
        {{- toYaml .backendRefs | nindent 8 }}
        {{- else }}
        - name: {{ include "link-vault.fullname" $ }}
          port: {{ $.Values.service.port }}
        {{- end }}
    {{- end }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "link-vault.fullname" . }}
          port: {{ .Values.service.port }}
    {{- end }}
{{- end }}
