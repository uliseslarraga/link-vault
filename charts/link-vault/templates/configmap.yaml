{{- if or .Values.configMap.env .Values.configMap.files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "link-vault.fullname" . }}
  labels:
    {{- include "link-vault.labels" . | nindent 4 }}
data:
  {{- with .Values.configMap.env }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- with .Values.configMap.files }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
