apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.io
spec:
  project: default

  source:
    repoURL: https://github.com/uliseslarraga/link-vault
    targetRevision: HEAD
    path: gitops/argocd/applications
    directory:
      recurse: true
      exclude: "app-of-apps.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
