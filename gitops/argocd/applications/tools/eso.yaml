apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "*"
    helm:
      valuesObject:
        tolerations:
        - key: dedicated
          operator: Equal
          value: system
          effect: NoSchedule
        nodeSelector:
          role: system
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::289296207513:role/link-vault-dev-eso
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
