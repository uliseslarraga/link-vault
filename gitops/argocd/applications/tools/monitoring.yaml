apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-monitoring-stack
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.io
spec:
  project: default
  sources:
  - repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 70.4.2
    helm:
      valueFiles:
      - $values/gitops/manifests/monitoring/values.yaml
  - repoURL: https://github.com/uliseslarraga/link-vault
    targetRevision: feat/gitops
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
