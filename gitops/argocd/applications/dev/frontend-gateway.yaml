apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-gateway
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/uliseslarraga/link-vault
    targetRevision: HEAD
    path: gitops/manifests/frontend-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
