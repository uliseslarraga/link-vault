apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.io
spec:
  project: default

  source:
    repoURL: https://github.com/uliseslarraga/link-vault
    targetRevision: HEAD
    path: charts/link-vault
    helm:
      valueFiles:
      - ../../gitops/environments/dev/frontend.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: frontend

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
