# fullnameOverride makes the service/configmap/deployment name predictable
# regardless of the Helm release name used.
fullnameOverride: frontend

image:
  repository: "289296207513.dkr.ecr.us-east-1.amazonaws.com/link-vault/frontend"
  tag: "latest"

containerPort: 80

service:
  type: ClusterIP
  port: 80

configMap:
  files:
    default.conf: |
      server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;
          index index.html;

          gzip on;
          gzip_types text/plain text/css application/json application/javascript text/xml;

          location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
              expires 1y;
              add_header Cache-Control "public, immutable";
          }

          location / {
              try_files $uri $uri/ /index.html;
          }

          location /api/ {
              proxy_pass http://backend:8000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }
      }

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

# Mount the nginx config from the configmap into the container
volumeMounts:
- name: nginx-config
  mountPath: /etc/nginx/conf.d/default.conf
  subPath: default.conf

volumes:
- name: nginx-config
  configMap:
    name: frontend
    items:
    - key: default.conf
      path: default.conf

httpRoute:
  enabled: true
  gatewayName: link-vault-gateway
  gatewayNamespace: default
  hostnames:
  - link-vault.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
