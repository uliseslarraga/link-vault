# fullnameOverride makes the service/configmap/deployment name predictable
# regardless of the Helm release name used.
fullnameOverride: backend
image:
  repository: "289296207513.dkr.ecr.us-east-1.amazonaws.com/link-vault/backend"
  tag: "sha-879b5994d7c6ddd4ef7da33377fc96109643f69b"
containerPort: 8000
service:
  type: ClusterIP
  port: 8000
configMap:
  env:
    S3_BUCKET: link-vault-dev
    AWS_REGION: us-east-1
    # S3_ENDPOINT_URL: ""  # uncomment and set for LocalStack or custom endpoint
    # Create a Kubernetes Secret named "link-vault-backend-secret" containing:
    #   DATABASE_URL        postgresql+asyncpg://user:pass@host:5432/linkvault
    #   AWS_ACCESS_KEY_ID   <your-key>
    #   AWS_SECRET_ACCESS_KEY <your-secret>
secretRef: link-vault-backend-secret
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
httpRoute:
  enabled: false
