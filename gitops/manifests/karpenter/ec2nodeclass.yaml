apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # EKS-optimised AL2023 — receives security patches automatically.
  amiFamily: AL2023

  # IAM role for Karpenter-provisioned nodes.
  # Value must be the role NAME (not ARN) — matches karpenter_node_role_arn output.
  role: link-vault-dev-karpenter-node

  # Discover private subnets by the Tier tag set in the network module.
  subnetSelectorTerms:
    - tags:
        Tier: private

  # Discover the cluster security group created and managed by EKS.
  securityGroupSelectorTerms:
    - tags:
        aws:eks:cluster-name: link-vault-dev

  # Always resolve the latest patched AL2023 AMI for the running K8s version.
  amiSelectorTerms:
    - alias: al2023@latest

  # Root volume — gp3 for better baseline performance at no extra cost.
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
