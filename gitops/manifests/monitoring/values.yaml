grafana:
  enabled: true
  adminPassword: "changeme"
  tolerations:
  - key: dedicated
    operator: Equal
    value: system
    effect: NoSchedule
  nodeSelector:
    role: system

prometheus:
  prometheusSpec:
    retention: 15d
    tolerations:
    - key: dedicated
      operator: Equal
      value: system
      effect: NoSchedule
    nodeSelector:
      role: system
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  alertmanagerSpec:
    tolerations:
    - key: dedicated
      operator: Equal
      value: system
      effect: NoSchedule
    nodeSelector:
      role: system

nodeExporter:
  enabled: true
  tolerations:
  - key: dedicated
    operator: Equal
    value: system
    effect: NoSchedule

kubeStateMetrics:
  enabled: false

prometheusOperator:
  tolerations:
  - key: dedicated
    operator: Equal
    value: system
    effect: NoSchedule
  nodeSelector:
    role: system
  admissionWebhooks:
    patch:
      tolerations:
      - key: dedicated
        operator: Equal
        value: system
        effect: NoSchedule
      nodeSelector:
        role: system
    createSecretJob:
      tolerations:
      - key: dedicated
        operator: Equal
        value: system
        effect: NoSchedule
    patchWebhookJob:
      tolerations:
      - key: dedicated
        operator: Equal
        value: system
        effect: NoSchedule
