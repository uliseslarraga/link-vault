apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: link-vault-slo
  namespace: monitoring
  labels:
    # prometheus community chart picks up rules with this label
    app: prometheus
    release: prometheus
spec:
  groups:
  - name: link_vault_slo_recording
    interval: 30s
    rules:
    # ── Availability ──────────────────────────────────────────────────────────
    # Assumes FastAPI app exposes http_requests_total{status_code, handler, method}
    # via prometheus-fastapi-instrumentator or equivalent.

    - record: job:http_requests_total:rate5m
      expr: |
        sum(rate(http_requests_total[5m]))

    - record: job:http_requests_errors:rate5m
      expr: |
        sum(rate(http_requests_total{status_code=~"5.."}[5m]))

    - record: job:http_success_ratio:rate5m
      expr: |
        1 - (job:http_requests_errors:rate5m / job:http_requests_total:rate5m)

    # 30-day error budget: fraction of requests allowed to fail at 99.9% SLO
    - record: job:http_error_budget_remaining:ratio
      expr: |
        1 - (
          sum_over_time(job:http_requests_errors:rate5m[30d]) /
          sum_over_time(job:http_requests_total:rate5m[30d])
        ) / (1 - 0.999)

    # ── Latency ───────────────────────────────────────────────────────────────
    # Assumes histogram metric http_request_duration_seconds_bucket

    - record: job:http_request_duration_p50:rate5m
      expr: |
        histogram_quantile(0.50,
          sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
        )

    - record: job:http_request_duration_p95:rate5m
      expr: |
        histogram_quantile(0.95,
          sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
        )

    - record: job:http_request_duration_p99:rate5m
      expr: |
        histogram_quantile(0.99,
          sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
        )

  - name: link_vault_slo_alerts
    rules:
    - alert: HighErrorRate
      expr: job:http_success_ratio:rate5m < 0.999
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Availability SLO breached"
        description: "Success rate is {{ $value | humanizePercentage }} — below 99.9% SLO"

    - alert: HighLatencyP95
      # Alert when P95 exceeds 500ms
      expr: job:http_request_duration_p95:rate5m > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Latency SLO breached"
        description: "P95 latency is {{ $value | humanizeDuration }} — above 500ms SLO"
