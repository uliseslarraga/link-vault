apiVersion: v1
kind: ConfigMap
metadata:
  name: link-vault-slo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  link-vault-slo.json: |
    {
      "title": "Link Vault — SLO Dashboard",
      "uid": "link-vault-slo",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Availability — Success Rate (SLO: 99.9%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0.99,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.999 },
                  { "color": "green", "value": 0.9995 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "1 - (sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m])))",
              "legendFormat": "Success Rate"
            },
            {
              "expr": "vector(0.999)",
              "legendFormat": "SLO Target (99.9%)"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Budget Remaining (30d)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.25 },
                  { "color": "green", "value": 0.5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "clamp_min(1 - ((sum_over_time((rate(http_requests_total{status_code=~\"5..\"}[5m]))[30d:5m]) / sum_over_time((rate(http_requests_total[5m]))[30d:5m])) / (1 - 0.999)), 0)",
              "legendFormat": "Budget Remaining"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latency Percentiles (SLO: P95 < 500ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.25 },
                  { "color": "red", "value": 0.5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P99"
            },
            {
              "expr": "vector(0.5)",
              "legendFormat": "SLO Target (500ms)"
            }
          ]
        },
        {
          "id": 4,
          "title": "Request Rate by Status",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status_code=~\"2..\"}[5m]))",
              "legendFormat": "2xx"
            },
            {
              "expr": "sum(rate(http_requests_total{status_code=~\"4..\"}[5m]))",
              "legendFormat": "4xx"
            },
            {
              "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m]))",
              "legendFormat": "5xx"
            }
          ]
        }
      ]
    }
