apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: argocd-tg-config
  namespace: argocd
spec:
  targetReference:
    name: argocd-server
    kind: Service
  targetType: ip
  ipAddressType: ipv4
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-httproute
  namespace: argocd
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
spec:
  parentRefs:
  - name: argocd-gateway
    namespace: argocd
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80
      filters: []
