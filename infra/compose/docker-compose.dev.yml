services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lv-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-linkvault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-linkvault}"]
      interval: 30s
      timeout: 30s
      retries: 10
    restart: unless-stopped

  # ── LocalStack (S3) ─────────────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.6
    container_name: lv-localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localstack
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep '\"s3\": \"available\"'"]
      interval: 30s
      timeout: 30s
      retries: 15
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/Dockerfile.backend
    container_name: lv-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-linkvault}
      S3_BUCKET: ${S3_BUCKET:-link-vault}
      S3_ENDPOINT_URL: http://localstack:4566
      S3_PRESIGN_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    #healthcheck:
    #  test: ["CMD-SHELL", "curl http://localhost:8000/health || grep '\"status\": \"ok\"'"]
    #  interval: 10s
    #  timeout: 5s
    #  retries: 5
    #  start_period: 10s
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: ../../infra/docker/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: lv-frontend
    ports:
      - "3000:80"
    #depends_on:
    #  backend:
    #    condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  localstack_data:
